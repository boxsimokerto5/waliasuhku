<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    
    <!-- Heart Gradient -->
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>

    <!-- Hands Gradient -->
    <linearGradient id="handsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Subtle Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Rounded App Icon Base -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Background Decorative Glowing Circles -->
  <circle cx="120" cy="120" r="180" fill="#ffffff" opacity="0.05" />
  <circle cx="420" cy="400" r="140" fill="#ffffff" opacity="0.03" />

  <!-- Main Illustration Group with Shadow -->
  <g filter="url(#shadow)">
    <!-- Protective Guardian Shield / Arch Outline -->
    <path d="M 256,100 C 310,100 360,125 380,165 C 380,260 330,340 256,390 C 182,340 132,260 132,165 C 152,125 202,100 256,100 Z" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="8" 
          stroke-linecap="round" 
          opacity="0.15" />

    <!-- Center Warm Heart with Glow -->
    <path d="M 256,290 C 256,290 180,240 180,195 C 180,165 205,140 235,140 C 248,140 253,145 256,148 C 259,145 264,140 277,140 C 307,140 332,165 332,195 C 332,240 256,290 256,290 Z" 
          fill="url(#heartGrad)" 
          filter="url(#glow)" />

    <!-- Left Caring Hand -->
    <path d="M 150,340 C 150,340 170,305 195,290 C 215,278 235,285 245,295 C 248,298 245,302 242,300 C 220,290 200,295 185,310 C 175,320 180,325 195,318 C 215,308 235,312 245,322 C 247,324 244,328 241,326 C 225,318 210,320 195,335 C 190,340 195,345 205,338 C 220,328 235,332 245,342 C 247,344 242,348 238,346 C 220,338 200,345 185,365 C 180,372 195,378 215,365 C 235,352 260,358 270,380 C 275,390 270,400 256,412 C 220,412 180,390 150,340 Z" 
          fill="url(#handsGrad)" />

    <!-- Right Caring Hand (Mirrored) -->
    <path d="M 362,340 C 362,340 342,305 317,290 C 297,278 277,285 267,295 C 264,298 267,302 270,300 C 292,290 312,295 327,310 C 337,320 332,325 317,318 C 297,308 277,312 267,322 C 265,324 268,328 271,326 C 287,318 302,320 317,335 C 322,340 317,345 307,338 C 292,328 277,332 267,342 C 265,344 270,348 274,346 C 292,338 312,345 327,365 C 332,372 317,378 297,365 C 277,352 252,358 242,380 C 237,390 242,400 256,412 C 292,412 332,390 362,340 Z" 
          fill="url(#handsGrad)" />
  </g>

  <!-- Glowing Aura Core -->
  <circle cx="256" cy="215" r="8" fill="#ffffff" opacity="0.8" filter="url(#glow)" />
</svg>
