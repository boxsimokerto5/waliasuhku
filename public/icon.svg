<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient matching the app's rich Indigo-Purple-Pink theme -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <!-- Warm Glowing center aura -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>

    <!-- Divine Soft Drop Shadow for the main emblem -->
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Rounded PWA Icon Base -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Subtle Sacred Geometric Background Overlay (Unity circles) -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.08" />
  <circle cx="256" cy="256" r="170" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.1" />

  <!-- Center Aura -->
  <circle cx="256" cy="256" r="130" fill="url(#glowGrad)" opacity="0.9" />

  <!-- Main Emblem Group (Heart Handshake) with Shadow -->
  <g filter="url(#softShadow)" transform="translate(106, 100) scale(12.5)" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Heart Path -->
    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" stroke-width="1.8" />
    
    <!-- Handshake Paths -->
    <path d="M12 5 9.04 7.96a2.17 2.17 0 0 0 0 3.08v0c.82.82 2.13.85 3 .07l2.07-1.9a2.82 2.82 0 0 1 3.79 0l2.96 2.96" />
    <path d="M7 15l-3-3" />
    <path d="M15 13l-3-3" />
  </g>

  <!-- Sparkles/Stars to add dynamic polish -->
  <path d="M 110,120 L 114,128 L 122,132 L 114,136 L 110,144 L 106,136 L 98,132 L 106,128 Z" fill="#ffffff" opacity="0.5" />
  <path d="M 402,120 L 406,128 L 414,132 L 406,136 L 402,144 L 398,136 L 390,132 L 398,128 Z" fill="#ffffff" opacity="0.5" />
  <path d="M 256,415 L 259,421 L 265,424 L 259,427 L 256,433 L 253,427 L 247,424 L 253,421 Z" fill="#ffffff" opacity="0.4" />
</svg>
