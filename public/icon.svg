<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    
    <!-- Gold Gradient for the Cross -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb" />
      <stop offset="30%" stop-color="#fef08a" />
      <stop offset="70%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Glowing White Gradient for Central Aura -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="40%" stop-color="#fef08a" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0" />
    </radialGradient>

    <!-- Glow Filter for Divine Light -->
    <filter id="divineGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Elegant Drop Shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- Rounded PWA Icon Base -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Subtle Sacred Geometric Background Overlay -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.08" />
  <circle cx="256" cy="256" r="170" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.1" />
  <line x1="256" y1="46" x2="256" y2="466" stroke="#ffffff" stroke-width="1" opacity="0.05" />
  <line x1="46" y1="256" x2="466" y2="256" stroke="#ffffff" stroke-width="1" opacity="0.05" />

  <!-- Divine Central Glow behind the Cross -->
  <circle cx="256" cy="210" r="120" fill="url(#glowGrad)" opacity="0.85" />

  <!-- Main Emblem Group with Shadow -->
  <g filter="url(#softShadow)">
    
    <!-- Protective Embrace/Guardian Wings Arcs (Representing Foster Care / Wali Asuh) -->
    <path d="M 120,380 C 130,280 180,240 256,240 C 332,240 382,280 392,380 C 340,360 290,350 256,350 C 222,350 172,360 120,380 Z" 
          fill="#ffffff" 
          opacity="0.12" />
          
    <path d="M 140,380 C 150,300 190,260 256,260 C 322,260 362,300 372,380 C 330,365 290,358 256,358 C 222,358 182,365 140,380 Z" 
          fill="#ffffff" 
          opacity="0.18" />

    <!-- Radiant Light Rays emanating from Cross Center -->
    <g opacity="0.45" stroke="#ffffff" stroke-width="4" stroke-linecap="round" filter="url(#divineGlow)">
      <line x1="256" y1="210" x2="256" y2="130" />
      <line x1="256" y1="210" x2="256" y2="290" />
      <line x1="256" y1="210" x2="176" y2="210" />
      <line x1="256" y1="210" x2="336" y2="210" />
      <line x1="256" y1="210" x2="200" y2="154" />
      <line x1="256" y1="210" x2="312" y2="154" />
      <line x1="256" y1="210" x2="200" y2="266" />
      <line x1="256" y1="210" x2="312" y2="266" />
    </g>

    <!-- Elegant Ring of Unity & Faith -->
    <circle cx="256" cy="210" r="64" fill="none" stroke="url(#goldGrad)" stroke-width="12" filter="url(#divineGlow)" opacity="0.9" />

    <!-- Sleek Christian Cross Base Shadow (gives 3D relief effect) -->
    <path d="M 238,80 L 274,80 L 274,390 C 274,395 270,400 264,400 L 248,400 C 242,400 238,395 238,390 Z" fill="#0f172a" opacity="0.2" />
    <path d="M 130,192 L 382,192 L 382,228 C 382,234 377,238 372,238 L 140,238 C 134,238 130,234 130,228 Z" fill="#0f172a" opacity="0.2" />

    <!-- Sleek Modern Christian Cross (Vertical Stem) with Beveled Corners -->
    <rect x="240" y="80" width="32" height="320" rx="6" fill="url(#goldGrad)" />
    
    <!-- Sleek Modern Christian Cross (Horizontal Bar) with Beveled Corners -->
    <rect x="132" y="194" width="248" height="32" rx="6" fill="url(#goldGrad)" />

    <!-- Cross Highlight Core (Inner bright white layer for shiny 3D look) -->
    <rect x="252" y="86" width="8" height="308" rx="2" fill="#ffffff" opacity="0.4" />
    <rect x="138" y="206" width="236" height="8" rx="2" fill="#ffffff" opacity="0.4" />

    <!-- Center Radiant Diamond Core -->
    <polygon points="256,198 268,210 256,222 244,210" fill="#ffffff" filter="url(#divineGlow)" />
  </g>
</svg>
